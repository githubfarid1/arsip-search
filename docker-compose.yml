services:
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: arsip-meilisearch
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=arsipsearch2024
    volumes:
      - ./meilisearch_data:/meili_data
    restart: unless-stopped
    networks:
      - arsipnet

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: arsip-api
    ports:
      - "8888:8888"
    env_file:
      - ./api/.env
    extra_hosts:
      - "host.docker.internal:172.17.0.1"
    volumes:
      - ./api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8888 --reload
    restart: unless-stopped
    depends_on:
      - meilisearch
    networks:
      - arsipnet

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: arsip-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://arsip-api:8888
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - arsipnet

networks:
  arsipnet:
    driver: bridge
