services:
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: arsip-meilisearch
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=arsipsearch2024
    volumes:
      - ./meilisearch_data:/meili_data
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: arsip-api
    ports:
      - "8888:8888"
    environment:
      - MEILI_URL=http://meilisearch:7700
      - MEILI_KEY=arsipsearch2024
      - MYSQL_HOST=host.docker.internal
      - MYSQL_PORT=3307
      - MYSQL_USER=root
      - MYSQL_PASSWORD=root123
      - MYSQL_DB=arsipserverdb2
      - PDF_BASE_PATH=/pdfs/arsip_tata
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8888 --reload
    restart: unless-stopped
    depends_on:
      - meilisearch

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: arsip-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://arsip-api:8888
    restart: unless-stopped
    depends_on:
      - api
